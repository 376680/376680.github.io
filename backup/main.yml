name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get repository name
      id: repo
      run: |
        REPO_NAME=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
        echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
        echo "Repository name: $REPO_NAME"

    - name: Build with Next.js
      run: |
        REPO_NAME="${{ steps.repo.outputs.repo_name }}"
        echo "Building for repository: $REPO_NAME"
        
        # 设置GitHub Actions环境变量
        export GITHUB_ACTIONS=true
        export NODE_ENV=production
        export NEXT_TELEMETRY_DISABLED=1
        
        # 特殊处理：如果是 username.github.io 格式的仓库，不需要设置basePath
        if [[ "$REPO_NAME" == *.github.io ]]; then
          echo "GitHub Pages user repository detected: $REPO_NAME"
          echo "Using root path configuration (no basePath)"
          
          # 创建适用于用户GitHub Pages的配置
          cat > next.config.temp.ts << 'EOF'
        import type { NextConfig } from "next";

        const nextConfig: NextConfig = {
          typescript: {
            ignoreBuildErrors: true,
          },
          output: 'export',
          trailingSlash: true,
          images: {
            unoptimized: true,
          },
          // 用户GitHub Pages不需要basePath和assetPrefix
          eslint: {
            ignoreDuringBuilds: true,
          },
        };

        export default nextConfig;
        EOF
        else
          echo "Standard repository detected: $REPO_NAME"
          echo "Using repository path configuration"
          
          # 创建适用于标准仓库的配置
          cat > next.config.temp.ts << EOF
        import type { NextConfig } from "next";

        const nextConfig: NextConfig = {
          typescript: {
            ignoreBuildErrors: true,
          },
          output: 'export',
          trailingSlash: true,
          images: {
            unoptimized: true,
          },
          basePath: '/$REPO_NAME',
          assetPrefix: '/$REPO_NAME',
          eslint: {
            ignoreDuringBuilds: true,
          },
        };

        export default nextConfig;
        EOF
        fi
        
        # 替换配置文件
        mv next.config.ts next.config.backup.ts
        mv next.config.temp.ts next.config.ts
        
        # 构建项目
        npm run build
        
        # 恢复原始配置文件
        if [ -f next.config.backup.ts ]; then
          mv next.config.backup.ts next.config.ts
        fi

    - name: Copy .nojekyll to output
      run: |
        cp .nojekyll out/ || echo ".nojekyll not found, creating..."
        touch out/.nojekyll

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './out'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
